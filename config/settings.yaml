project:
  name: corrosion-monitor
  mode: demo
paths:
  logs_dir: data/logs
  sessions_dir: data/sessions
  thresholds_file: config/thresholds.yaml
  camera_profile_file: config/camera_profile.yaml
  retry_policy_file: config/retry_policy.yaml
runtime:
  cycle_seconds: 10
  structured_logging: true
ai:
  provider: vertex
  auth_mode: auto
  project_id: "corrsion"
  location: us-central1
  primary_model_id: gemini-2.5-flash
  fallback_model_id: gemini-2.5-pro
  enable_cloud_vision: true
  enable_cloud_orchestrator: true
  browser_timeout_seconds: 120
  sensor_timeout_seconds: 25
  vision_timeout_seconds: 20
  final_report_timeout_seconds: 25
  response_mode: json

camera:
  sensor: imx477
  still_width: 1920
  still_height: 1080
  roi:
    x: 0.05
    y: 0.05
    w: 0.90
    h: 0.90
  exposure_mode: manual
  exposure_time_us: 12000
  analogue_gain: 1.5
  awb_mode: off
  color_gains:
    red: 1.5
    blue: 1.4
  blur_threshold: 90.0
  overexposed_pct_max: 4.0
  underexposed_pct_max: 4.0
